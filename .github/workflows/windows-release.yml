name: Windows multi-version release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test-release:
    runs-on: windows-2022
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        shell: pwsh
        run: dotnet restore "ZyperWin++.sln"

      - name: Build Release
        shell: pwsh
        run: dotnet build "ZyperWin++.sln" -c Release --no-restore

      - name: Run regression tests
        shell: pwsh
        run: dotnet run --project ".\CDriveCleaner.Tests\CDriveCleaner.Tests.csproj" -c Release -f net8.0-windows --no-build

      - name: Publish self-contained executables
        shell: pwsh
        run: |
          $common = @(
            '.\ZyperWin++\ZyperWin++.csproj',
            '-c', 'Release',
            '-f', 'net8.0-windows',
            '--self-contained', 'true',
            '-p:PublishSingleFile=true',
            '-p:IncludeNativeLibrariesForSelfExtract=true',
            '-p:EnableCompressionInSingleFile=true',
            '-p:PublishTrimmed=false',
            '-p:PublishReadyToRun=false',
            '-p:DebugType=None',
            '-p:DebugSymbols=false'
          )
          dotnet publish @common -r win-x64 -o '.\publish\win-x64'
          dotnet publish @common -r win-x86 -o '.\publish\win-x86'

      - name: Publish Windows 7 SP1 .NET Framework executables
        shell: pwsh
        run: |
          $project = '.\ZyperWin++\ZyperWin++.csproj'
          dotnet publish $project -c Release -f net48 -r win-x64 --self-contained false `
            -p:PlatformTarget=x64 -p:Prefer32Bit=false -p:DebugType=None -p:DebugSymbols=false `
            -o '.\publish\net48-win-x64'
          dotnet publish $project -c Release -f net48 -r win-x86 --self-contained false `
            -p:PlatformTarget=x86 -p:Prefer32Bit=true -p:DebugType=None -p:DebugSymbols=false `
            -o '.\publish\net48-win-x86'

      - name: Run published executable startup smoke tests
        shell: pwsh
        run: |
          foreach ($rid in @('win-x64', 'win-x86')) {
            Remove-Item '.\smoke-test-ok.txt', '.\smoke-test-error.txt', '.\smoke-test-trace.txt' -Force -ErrorAction SilentlyContinue
            $exe = ".\publish\$rid\C DiskGlow.exe"
            $process = Start-Process $exe -ArgumentList '--smoke-test' -Wait -PassThru
            if ($process.ExitCode -ne 0) {
              if (Test-Path '.\smoke-test-trace.txt') { Get-Content '.\smoke-test-trace.txt' }
              if (Test-Path '.\smoke-test-error.txt') { Get-Content '.\smoke-test-error.txt' }
              throw "$rid executable smoke test failed with exit code $($process.ExitCode)."
            }
            if (-not (Test-Path '.\smoke-test-ok.txt')) {
              throw "$rid executable smoke test did not write its success marker."
            }
          }

      - name: Run .NET Framework single-executable smoke tests
        shell: pwsh
        run: |
          foreach ($rid in @('net48-win-x64', 'net48-win-x86')) {
            Remove-Item '.\smoke-test-ok.txt', '.\smoke-test-error.txt', '.\smoke-test-trace.txt' -Force -ErrorAction SilentlyContinue
            $source = Get-Item ".\publish\$rid\C DiskGlow.exe"
            if ($source.Length -lt 2000000) {
              throw "$rid executable is too small to contain its managed dependencies: $($source.Length) bytes."
            }
            $isolated = ".\publish\isolated-$rid"
            New-Item -ItemType Directory -Force $isolated | Out-Null
            Copy-Item $source.FullName "$isolated\C DiskGlow.exe"
            $process = Start-Process "$isolated\C DiskGlow.exe" -ArgumentList '--smoke-test' -Wait -PassThru
            if ($process.ExitCode -ne 0) {
              if (Test-Path '.\smoke-test-trace.txt') { Get-Content '.\smoke-test-trace.txt' }
              if (Test-Path '.\smoke-test-error.txt') { Get-Content '.\smoke-test-error.txt' }
              throw "$rid executable smoke test failed with exit code $($process.ExitCode)."
            }
            if (-not (Test-Path '.\smoke-test-ok.txt')) {
              throw "$rid executable smoke test did not write its success marker."
            }
          }

      - name: Validate self-contained single-file executables
        shell: pwsh
        run: |
          $mt = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Filter mt.exe -Recurse |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $mt) { throw "Windows SDK manifest tool was not found." }
          foreach ($rid in @('win-x64', 'win-x86')) {
            $folder = ".\publish\$rid"
            $exe = Get-Item "$folder\C DiskGlow.exe"
            if ($exe.Length -lt 30000000) {
              throw "$rid executable is too small to contain the .NET runtime: $($exe.Length) bytes."
            }
            $unexpected = Get-ChildItem $folder -File | Where-Object { $_.Extension -in @('.dll', '.deps.json', '.runtimeconfig.json') }
            if ($unexpected) {
              throw "$rid publish is not a single executable: $($unexpected.Name -join ', ')"
            }
            & $mt.FullName -nologo "-inputresource:$($exe.FullName);#1" "-out:embedded-$rid.manifest"
            $manifest = Get-Content "embedded-$rid.manifest" -Raw
            if ($manifest -notmatch 'requireAdministrator') {
              throw "$rid administrator manifest was not embedded."
            }
            Write-Host "Validated $rid $($exe.Length) bytes"
          }
          foreach ($rid in @('net48-win-x64', 'net48-win-x86')) {
            $exe = Get-Item ".\publish\$rid\C DiskGlow.exe"
            & $mt.FullName -nologo "-inputresource:$($exe.FullName);#1" "-out:embedded-$rid.manifest"
            $manifest = Get-Content "embedded-$rid.manifest" -Raw
            if ($manifest -notmatch 'requireAdministrator') {
              throw "$rid administrator manifest was not embedded."
            }
          }

      - name: Build Windows 7 dependency-bundled installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force '.\publish\redist', '.\artifacts' | Out-Null
          $framework = (Resolve-Path '.\publish\redist').Path + '\ndp48-x86-x64-allos-enu.exe'
          curl.exe -fL 'https://go.microsoft.com/fwlink/?linkid=2088631' -o $framework
          $signature = Get-AuthenticodeSignature $framework
          if ($signature.Status -ne 'Valid' -or $signature.SignerCertificate.Subject -notmatch 'Microsoft') {
            throw "The downloaded .NET Framework installer does not have a valid Microsoft signature."
          }

          choco install innosetup --no-progress -y
          $iscc = Get-ChildItem ${env:ProgramFiles(x86)} -Filter ISCC.exe -Recurse -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $iscc) { throw 'Inno Setup compiler was not found.' }
          $x64 = (Resolve-Path '.\publish\net48-win-x64\C DiskGlow.exe').Path
          $x86 = (Resolve-Path '.\publish\net48-win-x86\C DiskGlow.exe').Path
          $output = (Resolve-Path '.\artifacts').Path
          & $iscc.FullName "/DAppSourceX64=$x64" "/DAppSourceX86=$x86" "/DFxSource=$framework" "/O$output" '.\installer\C-DiskGlow-Win7.iss'
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed with exit code $LASTEXITCODE." }
          if (-not (Test-Path '.\artifacts\C-DiskGlow-Windows7-SP1-x86-x64-setup.exe')) {
            throw 'Windows 7 setup executable was not generated.'
          }

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item '.\publish\win-x64\C DiskGlow.exe' '.\artifacts\C-DiskGlow-win-x64-self-contained.exe'
          Copy-Item '.\publish\win-x86\C DiskGlow.exe' '.\artifacts\C-DiskGlow-win-x86-self-contained.exe'
          Copy-Item '.\publish\net48-win-x64\C DiskGlow.exe' '.\artifacts\C-DiskGlow-win7-net48-x64.exe'
          Copy-Item '.\publish\net48-win-x86\C DiskGlow.exe' '.\artifacts\C-DiskGlow-win7-net48-x86.exe'
          Get-ChildItem '.\artifacts\*.exe' | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)"
          } | Set-Content '.\artifacts\SHA256SUMS.txt' -Encoding ascii

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: C-DiskGlow-Windows-${{ github.run_number }}
          path: artifacts/*

      - name: Publish GitHub release
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "csharp-windows-${{ github.run_number }}"
          gh release create $tag artifacts/* --title "C DiskGlow Windows build ${{ github.run_number }}" --notes "Windows 10/11: use the x64 or x86 self-contained executable; no .NET installation is required. Windows 7 SP1: use C-DiskGlow-Windows7-SP1-x86-x64-setup.exe; it automatically installs the bundled Microsoft .NET Framework 4.8 when missing. The smaller win7-net48 executables are for machines that already have .NET Framework 4.8."
